<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Champions League Bot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: linear-gradient(to right, #0a1f44, #020617);
      color: white;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 60px;
      background: rgba(0, 0, 40, 0.8);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    header h2 {
      color: #ffffff;
      letter-spacing: 2px;
      font-weight: 600;
    }

    nav a {
      margin: 0 15px;
      text-decoration: none;
      color: #d1d5db;
      font-size: 14px;
      transition: 0.3s;
    }

    nav a:hover {
      color: #00bfff;
    }

    .hero {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 90vh;
      padding: 0 60px;
    }

    .hero-text {
      max-width: 500px;
    }

    .hero-text h1 {
      font-size: 58px;
      font-weight: 700;
      line-height: 1.1;
    }

    .hero-text h1 span {
      color: #00bfff;
    }

    .hero-text p {
      margin-top: 20px;
      font-size: 15px;
      color: #9ca3af;
      line-height: 1.6;
    }

    .btn {
      margin-top: 25px;
      padding: 12px 28px;
      background: linear-gradient(135deg, #00bfff, #2563eb);
      border: none;
      color: white;
      font-weight: 600;
      cursor: pointer;
      border-radius: 6px;
      transition: 0.3s;
    }

    .btn:hover {
      background: white;
      color: #0a1f44;
    }

    .hero-img img {
      width: 480px;
      border-radius: 15px;
      box-shadow: 0 0 40px rgba(0, 191, 255, 0.3);
    }

    footer {
      text-align: center;
      padding: 15px;
      font-size: 13px;
      opacity: 0.5;
    }

    @media(max-width: 900px) {
      .hero {
        flex-direction: column;
        text-align: center;
        height: auto;
        padding: 40px 20px;
      }

      .hero-img img {
        width: 300px;
        margin-top: 30px;
      }
    }
  </style>
</head>

<body>

  <header>
    <h2>SPORTS BOT</h2>
    <nav>
      <a href="#">Home</a>
      <a href="#">Teams</a>
      <a href="#">Fixtures</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <section class="hero">
    <div class="hero-text">
      <h1>GET YOUR <span>FOOTBALL NEWS NOW</span></h1>
      <p>
        Get real-time updates on matches, teams, players, and stats. 
        Experience the ultimate football competition with your smart assistant.
      </p>
      <button class="btn" onclick="alert('Chat icon is at bottom right!')">
        Start Chat
      </button>
    </div>

    <div class="hero-img">
      <img src="https://images.unsplash.com/photo-1518091043644-c1d4457512c6">
    </div>
  </section>

  <footer>Powered by IBM Watsonx Assistant</footer>

  <script>
    window.watsonAssistantChatOptions = {
      integrationID: "de5224ed-0fa0-4cf2-b995-2b30a75bee63",
      region: "au-syd",
      serviceInstanceID: "7a0e200c-1fc3-45d1-a4bf-1945cb1811e4",
      onLoad: async (instance) => { await instance.render(); }
    };

    setTimeout(function(){
      const t = document.createElement('script');
      t.src = "https://web-chat.global.assistant.watson.appdomain.cloud/versions/" 
              + (window.watsonAssistantChatOptions.clientVersion || 'latest') 
              + "/WatsonAssistantChatEntry.js";
      document.head.appendChild(t);
    });
  </script>

</body>
</html>
