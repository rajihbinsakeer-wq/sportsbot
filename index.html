<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SportsBot - Neon Edition</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      color: white;
      text-align: center;

      /* Background Image + Neon Overlay */
      background: 
        linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)),
        url('cristiano-ronaldo-cool-real-madrid-cfikqdlniq9k836k.jpg') no-repeat center center/cover;
    }

    header {
      padding: 20px;
      font-size: 30px;
      font-weight: bold;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(10px);
      text-shadow: 0 0 10px #00f7ff, 0 0 20px #00f7ff;
    }

    .container {
      margin-top: 120px;
    }

    h1 {
      font-size: 50px;
      text-shadow: 0 0 15px #00c6ff, 0 0 30px #0072ff;
    }

    p {
      font-size: 18px;
      opacity: 0.9;
      text-shadow: 0 0 5px #00f7ff;
    }

    .btn {
      margin-top: 25px;
      padding: 14px 30px;
      border-radius: 30px;
      font-size: 16px;
      cursor: pointer;
      border: 2px solid #00f7ff;
      background: transparent;
      color: #00f7ff;
      transition: 0.3s;
      box-shadow: 0 0 10px #00f7ff, inset 0 0 10px #00f7ff;
    }

    .btn:hover {
      background: #00f7ff;
      color: black;
      box-shadow: 0 0 20px #00f7ff, 0 0 40px #00c6ff;
    }

    footer {
      position: fixed;
      bottom: 10px;
      width: 100%;
      font-size: 14px;
      opacity: 0.7;
      text-shadow: 0 0 5px #00f7ff;
    }
  </style>
</head>

<body>

  <header>⚽ SportsBot Assistant</header>

  <div class="container">
    <h1>Welcome!</h1>
    <p>Ask me anything about sports 🎯</p>
    <button class="btn" onclick="alert('Chat icon is at the bottom right!')">
      Start Chat
    </button>
  </div>

  <footer>Powered by IBM Watsonx Assistant</footer>

  <!-- Watson Assistant Script -->
  <script>
    window.watsonAssistantChatOptions = {
      integrationID: "de5224ed-0fa0-4cf2-b995-2b30a75bee63",
      region: "au-syd",
      serviceInstanceID: "7a0e200c-1fc3-45d1-a4bf-1945cb1811e4",
      onLoad: async (instance) => { await instance.render(); }
    };

    setTimeout(function(){
      const t = document.createElement('script');
      t.src = "https://web-chat.global.assistant.watson.appdomain.cloud/versions/" 
              + (window.watsonAssistantChatOptions.clientVersion || 'latest') 
              + "/WatsonAssistantChatEntry.js";
      document.head.appendChild(t);
    });
  </script>

</body>
</html>
