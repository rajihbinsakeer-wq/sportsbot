<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SportsBot - Pro Theme</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Arial', sans-serif;
    }

    body {
      background: #0b0f14;
      color: white;
    }

    /* NAVBAR */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 60px;
      background: rgba(0,0,0,0.6);
    }

    header h2 {
      color: #9cff00;
      letter-spacing: 2px;
    }

    nav a {
      margin: 0 15px;
      text-decoration: none;
      color: white;
      font-size: 14px;
      transition: 0.3s;
    }

    nav a:hover {
      color: #9cff00;
    }

    /* HERO SECTION */
    .hero {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 90vh;
      padding: 0 60px;
      position: relative;
      overflow: hidden;
    }

    /* Background diagonal neon shape */
    .hero::after {
      content: "";
      position: absolute;
      right: -150px;
      top: 0;
      width: 500px;
      height: 100%;
      background: #9cff00;
      transform: skewX(-25deg);
      z-index: 0;
    }

    /* LEFT TEXT */
    .hero-text {
      max-width: 500px;
      z-index: 1;
    }

    .hero-text h1 {
      font-size: 60px;
      font-weight: bold;
      line-height: 1.1;
    }

    .hero-text h1 span {
      color: #9cff00;
    }

    .hero-text p {
      margin-top: 20px;
      font-size: 14px;
      color: #bbb;
      line-height: 1.6;
    }

    .btn {
      margin-top: 25px;
      padding: 12px 25px;
      background: #9cff00;
      border: none;
      color: black;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: white;
    }

    /* RIGHT IMAGE */
    .hero-img {
      position: relative;
      z-index: 1;
    }

    .hero-img img {
      width: 450px;
      filter: drop-shadow(0 0 20px rgba(0,0,0,0.6));
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 15px;
      font-size: 14px;
      opacity: 0.6;
    }

    /* RESPONSIVE */
    @media(max-width: 900px) {
      .hero {
        flex-direction: column;
        text-align: center;
      }

      .hero-img img {
        width: 300px;
        margin-top: 20px;
      }

      .hero::after {
        display: none;
      }
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <header>
    <h2>SPORT BOT</h2>
    <nav>
      <a href="#">Home</a>
      <a href="#">Company</a>
      <a href="#">Players</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-text">
      <h1>FOCUS ON YOUR <span>PURPOSE</span></h1>
      <p>
        Ask anything about sports, players, teams, and stats. 
        Your smart assistant is ready to help instantly.
      </p>
      <button class="btn" onclick="alert('Chat icon is at bottom right!')">
        Start Chat
      </button>
    </div>

    <div class="hero-img">
      <img src="bespo1.jpg" alt="Sports Player">
    </div>
  </section>

  <footer>Powered by IBM Watsonx Assistant</footer>

  <!-- Watson Assistant Script -->
  <script>
    window.watsonAssistantChatOptions = {
      integrationID: "de5224ed-0fa0-4cf2-b995-2b30a75bee63",
      region: "au-syd",
      serviceInstanceID: "7a0e200c-1fc3-45d1-a4bf-1945cb1811e4",
      onLoad: async (instance) => { await instance.render(); }
    };

    setTimeout(function(){
      const t = document.createElement('script');
      t.src = "https://web-chat.global.assistant.watson.appdomain.cloud/versions/" 
              + (window.watsonAssistantChatOptions.clientVersion || 'latest') 
              + "/WatsonAssistantChatEntry.js";
      document.head.appendChild(t);
    });
  </script>

</body>
</html>
